  <header class="page-header">
    <div class="page-header-bg"></div>
    <div class="container page-header-content">
      <div class="page-tag mono">// Guestbook</div>
      <h1 class="page-title">留言板</h1>
      <p class="page-subtitle">欢迎留下你的足迹 ✨</p>
    </div>
  </header>

  <main class="section">
    <div class="guestbook-wrap">

      <!-- Message Form -->
      <div class="guestbook-form-card fade-in">
        <div class="guestbook-form-title">写下留言</div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">昵称 *</label>
              <input type="text" class="form-input" id="gbName" placeholder="你的名字..." maxlength="30">
            </div>
            <div class="form-group">
              <label class="form-label">网站（可选）</label>
              <input type="text" class="form-input" id="gbSite" placeholder="https://...">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">留言内容 *</label>
            <textarea class="form-textarea" id="gbContent" rows="4"
              placeholder="写下你想说的话... 可以是问好、交流想法、申请友链等 😊"
              maxlength="500"></textarea>
            <div style="text-align:right;font-size:0.72rem;font-family:var(--font-mono);color:var(--text-muted);margin-top:4px;">
              <span id="gbCount">0</span>/500
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <button class="btn btn-primary" id="gbSubmit">
              发送留言 →
            </button>
            <span style="font-size:0.75rem;color:var(--text-muted);">
              留言仅供展示，请勿包含敏感信息
            </span>
          </div>
        </div>
      </div>

      <!-- Messages list -->
      <div style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:0.8rem;font-family:var(--font-mono);color:var(--text-muted);">
          // <span id="gbTotal">0</span> 条留言
        </div>
      </div>

      <div class="messages-list" id="messagesList">
        <!-- Populated by JS -->
      </div>
    </div>
  </main>
